name: Build
on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-24.04
    if: "!contains(github.event.head_commit.message, 'skip ci') && !contains(github.event.head_commit.message, 'ci skip')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Prepare gradle
        run: ./gradlew

      - name: Build jar
        run: ./gradlew build --no-daemon --refresh-dependencies --parallel

      - name: Upload project jars
        uses: actions/upload-artifact@v5
        with:
          name: PlayerCulling-Artifacts
          path: build/libs/PlayerCulling-*
          if-no-files-found: error
